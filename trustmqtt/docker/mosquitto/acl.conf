# Static device ACLs. Zero-trust behavioral enforcement is layered on top of
# this by trustmqtt_plugin (see docs/SPEC.md §6) — this file only sets the
# baseline per-credential topic scope, it does not know about verdict levels.
user plant-a
topic readwrite plant-a/#

user plant-b
topic readwrite plant-b/#

# The plugin quarantines clients into this namespace at QUARANTINE level;
# every authenticated user may still publish here so operators can drain
# a quarantined device's last-gasp diagnostics.
pattern readwrite tmq/quarantine/%c/#

# Per-device fleet namespace: any client (including anonymous ones, e.g.
# the traffic simulator and eval/replay.py's synthetic devices) may only
# read/write topics under its own client-id-scoped namespace. This is the
# baseline zero-trust ACL shape — a device's static grant is "yourself
# only"; trustmqtt_plugin's behavioral scoring is what catches a device
# straying in ways ACLs alone can't express.
pattern readwrite fleet/%c/#
