# TrustMQTT broker config — Mosquitto 2.1.x
# For production, set allow_anonymous false and configure a password_file.
listener 1883
listener 9001
protocol websockets

allow_anonymous true
acl_file /mosquitto/config/acl.conf

persistence true
persistence_location /mosquitto/data/
log_dest stdout

plugin /mosquitto/plugin/trustmqtt_plugin.so
plugin_opt_redis_host redis
plugin_opt_redis_port 6379
plugin_opt_emit_batch_ms 100
plugin_opt_verdict_refresh_ms 500
plugin_opt_mode enforce
plugin_opt_payload_hash off
