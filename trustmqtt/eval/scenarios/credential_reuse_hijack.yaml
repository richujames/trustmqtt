# Credential-reuse hijack (spec §9.1): the same client_id keeps its valid
# credentials but starts publishing to a topic it has never used before
# (an "admin" topic), simulating a stolen/reused identity.
clients: 20
duration_s: 900
baseline_rate_hz: 1.0
topic_template: "fleet/{client_id}/temp"
attacks:
  - type: credential_reuse
    start_s: 600
    duration_s: 120
    clients: [3]
