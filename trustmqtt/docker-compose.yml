version: '3.8'
services:
  mosquitto:
    build: ./broker-plugin
    volumes:
      - ./mosquitto-config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"
      - "9001:9001"
    depends_on:
      - redis
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
  scoring-worker:
    build: ./scoring-worker
    volumes:
      - ./scoring-worker:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=mysql+pymysql://trustmqtt:trustmqtt@mysql:3306/trustmqtt
    depends_on:
      - redis
      - mysql
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: trustmqtt
      MYSQL_USER: trustmqtt
      MYSQL_PASSWORD: trustmqtt
    ports:
      - "3306:3306"
  grafana:
    image: grafana/grafana:8.5.27
    ports:
      - "3000:3000"
